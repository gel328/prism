<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Prism</title>
    <meta name="description" content="Sign in to your account" />
    <meta name="application-name" content="Prism" />
    <meta name="theme-color" content="#0078d4" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Prism" />
    <meta property="og:description" content="Sign in to your account" />
    <meta property="og:image" content="/ic_fluent_lock_shield_48_color.svg" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/ic_fluent_lock_shield_48_color.svg"
    />

    <!-- Resolve color scheme synchronously before paint and refresh the
         prism_color_scheme cookie from matchMedia. The cookie is what the
         server reads on the *next* request to SSR with the right theme;
         refreshing it on every load means an OS theme change is picked up
         by the next navigation, not the one after. -->
    <script>
      (function () {
        var scheme =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.cookie =
          "prism_color_scheme=" +
          scheme +
          "; path=/; max-age=31536000; samesite=lax";
        document.documentElement.setAttribute("data-theme", scheme);
      })();
    </script>
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <!--app-state-->
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
